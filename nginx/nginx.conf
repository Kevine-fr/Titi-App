user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # === CRUCIAL POUR LES GROS FICHIERS ===
    # Taille max d'une requête (uploads). 1 Go par défaut, ajuste si besoin.
    client_max_body_size 1024M;

    # Ne PAS bufferiser la requête côté nginx : on stream directement vers Next.js
    # Sans ça, nginx écrit le fichier entier dans /tmp avant de le passer à l'app.
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;

    # Timeouts longs (un upload de 300 Mo en 4G met du temps)
    client_body_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # Zone de rate limit pour le login : 5 req/min par IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        # Rate limit basique sur le login pour éviter le brute-force
        location = /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Streaming des PDFs : on laisse nginx faire son boulot (sendfile)
        # Mais comme ça passe par Next.js (auth + range), on garde le proxy.
        location /api/stream/ {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            # Permettre les Range requests
            proxy_cache_bypass $http_range;
            proxy_no_cache $http_range;
        }

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
